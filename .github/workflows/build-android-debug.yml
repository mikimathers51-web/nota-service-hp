name: Build Android Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ==========================================
      # GANTI npm ci dengan npm install
      # ==========================================
      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/android

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Setup Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          for i in {1..10}; do
            if [ -f "$MANIFEST" ]; then
              echo "✅ Manifest ditemukan setelah $i detik"
              break
            fi
            sleep 1
          done
          
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml tidak ditemukan!"
            find android -name "*.xml" 2>/dev/null | head -5
            exit 1
          fi
          
          cp "$MANIFEST" "$MANIFEST.bak"
          
          add_permission() {
            local perm="$1"
            if ! grep -q "android:name=\"$perm\"" "$MANIFEST"; then
              sed -i "/<\/manifest>/i\    <uses-permission android:name=\"$perm\" />" "$MANIFEST"
              echo "✅ + $perm"
            else
              echo "ℹ️  = $perm (sudah ada)"
            fi
          }
          
          add_permission_limited() {
            local perm="$1"
            local maxsdk="$2"
            if ! grep -q "android:name=\"$perm\"" "$MANIFEST"; then
              sed -i "/<\/manifest>/i\    <uses-permission android:name=\"$perm\" android:maxSdkVersion=\"$maxsdk\" />" "$MANIFEST"
              echo "✅ + $perm (maxSdk: $maxsdk)"
            else
              echo "ℹ️  = $perm (sudah ada)"
            fi
          }
          
          echo "🔧 Menambahkan permissions..."
          
          add_permission "android.permission.READ_CONTACTS"
          add_permission "android.permission.WRITE_CONTACTS"
          add_permission "android.permission.CAMERA"
          add_permission_limited "android.permission.BLUETOOTH" "30"
          add_permission_limited "android.permission.BLUETOOTH_ADMIN" "30"
          add_permission "android.permission.BLUETOOTH_SCAN"
          add_permission "android.permission.BLUETOOTH_CONNECT"
          add_permission "android.permission.BLUETOOTH_ADVERTISE"
          add_permission "android.permission.ACCESS_FINE_LOCATION"
          add_permission "android.permission.ACCESS_COARSE_LOCATION"
          add_permission "android.permission.INTERNET"
          add_permission "android.permission.ACCESS_NETWORK_STATE"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Verify APK exists
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK ditemukan: $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "❌ APK tidak ditemukan!"
            find android -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
